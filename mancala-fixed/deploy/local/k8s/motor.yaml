apiVersion: apps/v1
kind: Deployment
metadata:
  name: motor
  namespace: mancala
  labels:
    app: motor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: motor
  template:
    metadata:
      labels:
        app: motor
    spec:
      containers:
      - name: motor
        image: local-motor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: OMP_NUM_THREADS
          valueFrom:
            configMapKeyRef:
              name: motor-config
              key: OMP_NUM_THREADS
        resources:
          requests:
            cpu: "1000m"
            memory: "256Mi"
          limits:
            cpu: "4000m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8001
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: motor-svc
  namespace: mancala
spec:
  selector:
    app: motor
  ports:
  - protocol: TCP
    port: 8001
    targetPort: 8001
  type: ClusterIP
