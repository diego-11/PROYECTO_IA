name: CI/CD — Build, Test, Push, SonarQube

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/mancala

jobs:
  # ── C++ build & unit tests ──────────────────────────────────────────────────
  motor-test:
    name: C++ Motor — Build & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libomp-dev

      - name: Configure CMake
        run: cmake -S motor -B motor/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build motor/build --parallel

      - name: Run unit tests
        run: ./motor/build/mancala_tests

      - name: Run benchmark (smoke test)
        run: |
          OMP_NUM_THREADS=2 ./motor/build/mancala_bench \
            --algo alphabeta --depth 6

  # ── Python backend tests ────────────────────────────────────────────────────
  backend-test:
    name: Python Backend — Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio anyio

      - name: Run tests
        run: python -m pytest backend/tests/ -v --tb=short

  # ── SonarQube static analysis ───────────────────────────────────────────────
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-24.04
    needs: [motor-test, backend-test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed for blame/history

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mancala-kalah
            -Dsonar.projectName="Mancala Kalah Parallel Engine"
            -Dsonar.sources=motor/src,backend/app,frontend/html
            -Dsonar.tests=motor/tests,backend/tests
            -Dsonar.cplusplus.file.suffixes=.cpp,.hpp
            -Dsonar.python.version=3.12

  # ── Build & push Docker images ──────────────────────────────────────────────
  docker-build-push:
    name: Docker — Build & Push
    runs-on: ubuntu-24.04
    needs: [motor-test, backend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & push motor
        uses: docker/build-push-action@v5
        with:
          context: motor
          file: motor/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-motor:${{ steps.tag.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-motor:latest

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Summary
        run: |
          echo "### Docker images pushed 🐳" >> $GITHUB_STEP_SUMMARY
          echo "- motor:${{ steps.tag.outputs.TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- backend:${{ steps.tag.outputs.TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- frontend:${{ steps.tag.outputs.TAG }}" >> $GITHUB_STEP_SUMMARY
